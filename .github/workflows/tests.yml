name: Tests

on:
  push:
    branches: ['windows-service-debug']
  workflow_dispatch:

jobs:
  tests:
    strategy:
      matrix:
        include:
          - node: 18
            os: windows-2022
            os-name: Windows
          - node: 25
            os: windows-2025
            os-name: Windows

      fail-fast: false

    name: 'Node ${{ matrix.node}} / ${{ matrix.os-name }}'
    timeout-minutes: 40
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Patch chokidar with debug logging
        run: node scripts/patch-chokidar-debug.cjs

      - name: Build
        run: npx tsc --build --pretty

      - name: Run service tests
        run: node --test --test-reporter=spec --test-timeout=60000 lib/test/service.test.js
        env:
          SHOW_TEST_OUTPUT: '1'
          NODE_OPTIONS: '--enable-source-maps'
          WIREIT_LOGGER: 'simple'
          WIREIT_PARALLEL: 1

      - name: Debug info
        if: always()
        run: |
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
          echo "OS info:"
          systeminfo | findstr /B /C:"OS Name" /C:"OS Version"
          echo "Chokidar version:"
          node -e "console.log(JSON.parse(require('fs').readFileSync(require.resolve('chokidar').replace(/index\.js$/,'package.json'),'utf8')).version)"
