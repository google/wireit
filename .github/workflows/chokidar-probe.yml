name: Chokidar Probe

on: [push, pull_request, workflow_dispatch]

jobs:
  chokidar-probe:
    strategy:
      matrix:
        include:
          - node: 25
            os: ubuntu-24.04
            os-name: Linux
          - node: 25
            os: macos-26
            os-name: Mac
          - node: 25
            os: windows-2025
            os-name: Windows
      fail-fast: false

    name: 'Probe / ${{ matrix.os-name }}'
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run test:chokidar-probe
